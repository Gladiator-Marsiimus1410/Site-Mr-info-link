<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Молодіжна Рада</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:'Roboto',sans-serif;
  background:linear-gradient(to bottom,#A2D5A2,#3AA86B);
  background-attachment:fixed;
}

/* Заголовок */
h1{
  text-align:center;
  color:#1F613A;
  font-family:'Poppins',sans-serif;
  margin-top:10px;
}

/* Навігація */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  display:flex;
  justify-content:center;
  padding:12px 0;
  z-index:1000;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
  border-bottom:2px solid #28A745;
}

nav a{
  margin:0 18px;
  text-decoration:none;
  color:#1F613A;
  font-weight:600;
  font-family:'Poppins',sans-serif;
}

nav a:hover{
  color:#28A745;
  transform:scale(1.1);
}

/* Контентна панель */
.sheet{
  background:#e6f2e6;
  width:90%;
  max-width:900px;
  margin:90px auto 40px;
  padding:40px;
  border-radius:25px;
  box-shadow:0 12px 40px rgba(0,0,0,0.2);
  text-align:center;
}

/* логотип */
.logo-box{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.logo-frame{
  width:300px;
  height:301px;
  border-radius:50%;
  padding:6px;
  background:linear-gradient(135deg,#3AA86B,#2E8B57);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 12px 30px rgba(0,0,0,0.25),0 0 25px rgba(46,139,87,0.5);
}

.logo{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  background:white;
}

/* підпис */
.subtitle{
  color:#34495E;
  margin-top:-5px;
  margin-bottom:30px;
}

/* кнопки */
.social-links{
  display:flex;
  flex-direction:column;
  gap:18px;
  max-width:420px;
  margin:20px auto;
}

.social-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  text-decoration:none;
  padding:18px;
  border-radius:60px;
  font-weight:600;
  font-size:18px;
  color:white;
  background:linear-gradient(135deg,#3AA86B,#28A745);
  border:2px solid #2E8B57;
  box-shadow:0 8px 25px rgba(0,0,0,0.25),inset 0 1px 1px rgba(255,255,255,0.4);
  transition:all .3s ease;
  animation:breath 3s infinite;
}

.social-btn i{
  font-size:20px;
}

.social-btn:hover{
  transform:scale(1.12);
  border-color:#1F613A;
  box-shadow:0 15px 40px rgba(0,0,0,0.35),0 0 20px rgba(40,167,69,0.7),0 0 35px rgba(58,168,107,0.6);
}

@keyframes breath{
  0%{transform:scale(1)}
  50%{transform:scale(1.04)}
  100%{transform:scale(1)}
}

/* Анімація барашка */
#sheep{
  position:fixed;
  bottom:0;
  left:0;
  width:120px;
  z-index:2000;
  animation:sheepRun 6s linear forwards;
  animation-play-state: paused;
  border:2px solid #1F613A;
  border-radius:50%;
}

@keyframes sheepRun {
  0% { bottom:0; left:0; transform:rotate(0deg);}
  100% { bottom:90%; left:90%; transform:rotate(15deg);}
}
</style>
</head>

<body>

<nav></nav>

<div class="sheet">
  <div class="logo-box">
    <div class="logo-frame">
      <img src="img/logo.png" class="logo">
    </div>
  </div>

  <h1>Молодіжна Рада Магдалинівської Селищної Ради</h1>

  <div class="subtitle">
    консультативно дорадчий орган
  </div>

  <div class="social-links">
    <a class="social-btn" href="https://www.instagram.com/mrada.mahdalynivka" target="_blank">
      <i class="fa-brands fa-instagram"></i> Instagram
    </a>

    <a class="social-btn" href="https://www.tiktok.com/@mrada.mahdalynivk" target="_blank">
      <i class="fa-brands fa-tiktok"></i> TikTok
    </a>

    <a class="social-btn" href="https://t.me/mradamahdalynivkaofficial" target="_blank">
      <i class="fa-brands fa-telegram"></i> Telegram
    </a>

    <a class="social-btn" href="mailto:radamolodi23@gmail.com">
      <i class="fa-solid fa-envelope"></i> Email
    </a>

    <a class="social-btn" href="https://magd.otg.dp.gov.ua/rada/molodizhna-rada" target="_blank">
      <i class="fa-solid fa-globe"></i> Офіційний сайт
    </a>

    <a class="social-btn" href="https://docs.google.com/forms/d/19XvV3vg_sgfs3d4zUUoAxQI_ZwgtPfKz8WGiQLlSwQM/edit" target="_blank">
      <i class="fa-solid fa-lightbulb"></i> 📢 Твоя думка важлива !
    </a>

    <a class="social-btn" href="https://docs.google.com/forms/d/1na2VT3Z_ylY-bg7aYT6xzoDk6Hf7Ds5x-ykKEDajHzY/edit" target="_blank">
      <i class="fa-solid fa-users"></i> Вступ у команду
    </a>
  </div>
</div>

<img src="/Site-Mr-info-link/img/thers-removebg-preview.png" id="sheep">

<audio id="bg-music">
  <source src="img/stardew_valley_background.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById('bg-music');
const sheep = document.getElementById('sheep');

// Запуск після першого кліку
document.body.addEventListener('click', function startMusicAndSheep() {
    music.volume = 0.3;
    music.play().catch(()=>console.log('Музика не запустилась'));
    sheep.style.animationPlayState = 'running';
    document.body.removeEventListener('click', startMusicAndSheep);
});
</script>

</body>
</html>
